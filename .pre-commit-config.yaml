# adapted from https://towardsdatascience.com/pre-commit-hooks-you-must-know-ff247f5feb7e
# Apply to all files without commiting:
#   pre-commit run --all-files
# Update this file:
#   pre-commit autoupdate
ci:
    autofix_prs: false  # as it would fail the Google CLA check
    autoupdate_schedule: quarterly
    skip: [pip-compile]

repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: check-ast
    -   id: check-case-conflict
    -   id: check-docstring-first
    -   id: check-executables-have-shebangs
    -   id: check-json
    -   id: check-yaml
    -   id: debug-statements
    -   id: detect-private-key
    -   id: end-of-file-fixer
    -   id: fix-byte-order-marker
    -   id: trailing-whitespace
    -   id: mixed-line-ending
-   repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
    -   id: nbqa-pyupgrade
        args: [--py36-plus]
-   repo: https://github.com/PyCQA/isort
    rev: 7.0.0
    hooks:
    -   id: isort
        args: ["--profile", "black", "-l80"]
        types_or: [python, pyi, jupyter]
- repo: https://github.com/psf/black
  rev: 25.12.0
  hooks:
    - id: black
      args: [-l 80]
      types_or: [python, pyi, jupyter]
-   repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
    -   id: pyupgrade
        args: [--py36-plus]
-   repo: https://github.com/pycqa/pylint
    rev: v4.0.4
    hooks:
    -   id: pylint
        args: ["--disable", "unexpected-keyword-arg,no-value-for-parameter,too-many-function-args"]

-   repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.4
    hooks:
      - id: pip-compile
        name: uv compile core
        args: [asl_core/pyproject.toml, --upgrade, --output-file=asl_core/requirements.lock]
        files: ^asl_core/(pyproject\.toml|requirements\.txt)$

      - id: pip-compile
        name: uv compile mlops
        args: [asl_mlops/pyproject.toml, --upgrade, --output-file=asl_mlops/requirements.lock]
        files: ^asl_mlops/(pyproject\.toml|requirements\.txt)$

      - id: pip-compile
        name: uv compile genai
        args: [asl_genai/pyproject.toml, --upgrade, --output-file=asl_genai/requirements.lock]
        files: ^asl_genai/(pyproject\.toml|requirements\.txt)$
